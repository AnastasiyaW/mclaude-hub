name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mclaude (parent library)
        run: |
          git clone https://github.com/AnastasiyaW/mclaude.git /tmp/mclaude
          pip install -e /tmp/mclaude
        shell: bash

      - name: Install mclaude-hub with dev extras
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
