site_name: "Retouch App Knowledge Base"
site_description: >-
  Internal knowledge base for the Retouch App project.
  Modules, decisions, API references, and gotchas.
site_url: "http://localhost:8200/"

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Engine:
      - Overview: engine/index.md
  - Converter:
      - Overview: converter/index.md
  - Plugin:
      - Overview: plugin/index.md
  - Server:
      - Overview: server/index.md
  - Tools:
      - Overview: tools/index.md
